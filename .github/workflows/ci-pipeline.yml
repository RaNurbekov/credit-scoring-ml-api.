name: Bank CI Pipeline

# Робот просыпается при каждом git push в ветку main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Робот создает виртуальный Linux-сервер

    steps:
    - name: 📥 Скачиваем код с GitHub
      uses: actions/checkout@v3

    - name: 🐍 Устанавливаем Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: 📦 Устанавливаем библиотеки тестирования
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: 🧪 Запускаем Автотесты!
      run: |
        pytest tests/